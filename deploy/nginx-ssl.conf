# HTTP → HTTPS (.by) + редирект тестовых доменов на основной сайт.
# ALIAS_HTTP_START
server {
    listen 80;
    server_name __ALIAS_SERVER_NAMES__;
    return 301 https://__PRIMARY__$request_uri;
}
# ALIAS_HTTP_END

server {
    listen 80;
    server_name __PRIMARY__ www.__PRIMARY__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name __PRIMARY__ www.__PRIMARY__;

    ssl_certificate /etc/letsencrypt/live/__PRIMARY__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__PRIMARY__/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location /static/ {
        alias __APP_DIR__/staticfiles/;
    }

    location /media/ {
        alias __APP_DIR__/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
